version: '3'

vars:
  CONTAINER_BIN: docker
  REGISTRY_HOST: ghcr.io
  IMAGE_PREFIX:
    sh: echo "{{.REGISTRY_HOST}}/$(git remote get-url origin | sed 's|.*github.com[:/]||; s|\.git$||')"
  # act — run GitHub Actions locally: https://github.com/nektos/act
  WORKFLOW: .github/workflows/build-images.yaml
  ACT_IMAGE: catthehacker/ubuntu:act-latest
  ACT_FLAGS: >-
    -P ubuntu-latest={{.ACT_IMAGE}}
    -P ubuntu-24.04-arm={{.ACT_IMAGE}}
    --matrix runner:ubuntu-24.04-arm
    -v

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  build:
    desc: Build all images locally
    deps:
      - task: build:yamcs
      - task: build:openmct
      - task: build:jupyter
      - task: build:sle

  build:yamcs:
    desc: Build yamcs image
    cmds:
      - >-
        {{.CONTAINER_BIN}} build
        -t {{.IMAGE_PREFIX}}/yamcs:latest
        -f containers/yamcs/Containerfile
        containers/yamcs

  build:openmct:
    desc: Build openmct image
    cmds:
      - >-
        {{.CONTAINER_BIN}} build
        -t {{.IMAGE_PREFIX}}/openmct:latest
        -f containers/openmct/Containerfile
        containers/openmct

  build:jupyter:
    desc: Build jupyter image
    cmds:
      - >-
        {{.CONTAINER_BIN}} build
        -t {{.IMAGE_PREFIX}}/jupyter:latest
        -f containers/jupyter/Containerfile
        containers/jupyter

  build:sle:
    desc: Build sle image
    cmds:
      - >-
        {{.CONTAINER_BIN}} build
        -t {{.IMAGE_PREFIX}}/sle:latest
        -f containers/sle/Containerfile
        containers/sle

  helm:lint:
    desc: Lint all Helm charts
    cmds:
      - helm lint helm/yamcs helm/openmct helm/jupyter helm/sle helm/mission-control

  helm:package:
    desc: Package mission-control umbrella chart
    deps: [helm:lint]
    cmds:
      - helm dependency update helm/mission-control
      - helm package helm/mission-control -d dist/

  helm:install:local:ingress:
    desc: Configure local nginx ingress controller. Done once then forever available.
    cmds:
      - |
        helm upgrade --install ingress-nginx ingress-nginx \
        --repo https://kubernetes.github.io/ingress-nginx \
        --namespace ingress-nginx --create-namespace