apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "jupyter.fullname" . }}-entrypoint
  labels:
    {{- include "jupyter.labels" . | nindent 4 }}
data:
  entrypoint.sh: |
    #!/usr/bin/env bash
    # Explicit cd — WORKDIR is not guaranteed when overridden via Helm ConfigMap
    cd /opt/jupyter
    jupyterhub -f ./jupyterhub_config.py
    tail -f /dev/null
